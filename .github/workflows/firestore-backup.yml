name: Firestore Backup

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backup:
    if: ${{ vars.BACKUP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_BACKUP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Start Firestore export
        run: |
          DESTINATION="gs://${FIRESTORE_BACKUP_BUCKET}/firestore/$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          gcloud firestore export "$DESTINATION" \
            --project="$FIREBASE_PROJECT_ID" \
            --database="(default)" \
            --async
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIRESTORE_BACKUP_BUCKET: ${{ vars.FIRESTORE_BACKUP_BUCKET }}
